<!doctype html>
<html lang="nl">
<head>
    <meta charset="utf-8">
    <title>VHSI Quote of the Day</title>
    <link rel="icon" href="data:;base64,=">
    <link rel="stylesheet" href="style.css">
    <script src="vhsi-quote.js" defer></script>
</head>
<body>
    <header>
        <h1>VHSI Quote of the Day</h1>
    </header>
    <main>
        <div class="controls">
            <button class="btn" data-action="kleur" data-value="lightblue">Blauwe achtergrond</button>
            <button class="btn" data-action="kleur" data-value="lightgreen">Groene achtergrond</button>
            <button class="btn" data-action="kleur" data-value="yellow">Gele achtergrond</button>
            <button class="btn" data-action="grootte" data-value="-2">Kleinere tekst</button>
            <button class="btn" data-action="grootte" data-value="4">Grotere tekst</button>
        </div>

        <div class="quote">
            A clever person solves a problem. A wise person avoids it. — Albert Einstein
        </div>

        <button class="btn reset" data-action="reset">Reset</button>
    </main>
</body>
</html>
